<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenType English — Học Tiếng Anh Thông Minh</title>
  <meta name="description" content="ZenType English là nền tảng học tiếng Anh thông minh với từ vựng, quiz, flashcard, luyện nghe-nói, spaced repetition và mini games. Học ít nhưng nhớ lâu!">
  <meta name="keywords" content="học tiếng anh, vocabulary, quiz, flashcard, speaking, listening, spaced repetition, zentype">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Main CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- App Container -->
  <div class="app-container">

    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <!-- Logo -->
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="logo-icon"><i class="fa-solid fa-language"></i></div>
          <div>
            <h1>ZenType</h1>
            <span class="logo-sub">Learn → Practice → Remember</span>
          </div>
        </div>
      </div>

      <!-- Level & XP -->
      <div class="sidebar-level" id="sidebar-level">
        <div class="level-info">
          <div class="level-badge">
            <i class="fa-solid fa-crown"></i>
            <span>Level <span id="sidebar-level-num">1</span></span>
          </div>
          <span class="xp-text"><span id="sidebar-xp">0</span> / <span id="sidebar-xp-next">100</span> XP</span>
        </div>
        <div class="xp-bar">
          <div class="xp-bar-fill" id="sidebar-xp-bar" style="width: 0%"></div>
        </div>
      </div>

      <!-- Quick Stats -->
      <div class="sidebar-stats">
        <div class="sidebar-stat">
          <span class="stat-num" id="sidebar-streak">0</span>
          <span class="stat-label">🔥 Streak</span>
        </div>
        <div class="sidebar-stat">
          <span class="stat-num" id="sidebar-words">0</span>
          <span class="stat-label">📚 Từ</span>
        </div>
        <div class="sidebar-stat">
          <span class="stat-num" id="sidebar-review">0</span>
          <span class="stat-label">📝 Ôn</span>
        </div>
      </div>

      <!-- Navigation -->
      <nav class="sidebar-nav">
        <div class="nav-section-title">Trang chính</div>
        <div class="nav-item active" data-page="dashboard">
          <i class="fa-solid fa-chart-pie"></i>
          <span>Dashboard</span>
        </div>
        <div class="nav-item" data-page="vocabulary">
          <i class="fa-solid fa-book-open"></i>
          <span>Từ Vựng</span>
        </div>

        <div class="nav-section-title">Luyện tập</div>
        <div class="nav-item" data-page="quiz">
          <i class="fa-solid fa-circle-question"></i>
          <span>Trắc Nghiệm</span>
        </div>
        <div class="nav-item" data-page="flashcard">
          <i class="fa-solid fa-clone"></i>
          <span>Flashcard</span>
        </div>
        <div class="nav-item" data-page="typing">
          <i class="fa-solid fa-keyboard"></i>
          <span>Bài Tập Viết</span>
        </div>
        <div class="nav-item" data-page="translate">
          <i class="fa-solid fa-language"></i>
          <span>Dịch Câu</span>
        </div>

        <div class="nav-section-title">Kỹ năng</div>
        <div class="nav-item" data-page="listening">
          <i class="fa-solid fa-headphones"></i>
          <span>Luyện Nghe</span>
        </div>
        <div class="nav-item" data-page="speaking">
          <i class="fa-solid fa-microphone"></i>
          <span>Luyện Nói</span>
        </div>
        <div class="nav-item" data-page="spaced-repetition">
          <i class="fa-solid fa-brain"></i>
          <span>Ôn Tập Thông Minh</span>
          <span class="nav-badge" id="review-badge" style="display:none">0</span>
        </div>

        <div class="nav-section-title">Giải trí</div>
        <div class="nav-item" data-page="minigames">
          <i class="fa-solid fa-gamepad"></i>
          <span>Mini Games</span>
        </div>
      </nav>
    </aside>

    <!-- Sidebar Backdrop (Mobile) -->
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

    <!-- Main Content Wrapper -->
    <div class="main-content-wrapper">

      <!-- Top Header -->
      <header class="top-header">
        <button class="menu-toggle" id="menu-toggle">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="page-title" id="page-title">
          <i class="fa-solid fa-chart-pie"></i>
          <span>Dashboard</span>
        </div>
        <div class="header-actions">
          <!-- Language Toggle Button -->
          <button class="header-btn tooltip" data-tooltip="Đang học: Tiếng Anh (Click để đổi)" id="btn-lang-toggle" style="width: auto; padding: 0 var(--space-sm); gap: var(--space-xs);">
            <span id="current-lang-flag">🇬🇧</span>
            <span id="current-lang-text" style="font-size: 0.8rem; font-weight: 700;">EN</span>
          </button>
          
          <!-- Theme Toggle Button -->
          <button class="header-btn tooltip" data-tooltip="Đổi giao diện" id="btn-theme-toggle">
            <i class="fa-solid fa-moon"></i>
          </button>

          <button class="header-btn tooltip" data-tooltip="Ôn tập hôm nay" id="btn-quick-review">
            <i class="fa-solid fa-brain"></i>
          </button>
          <button class="header-btn tooltip" data-tooltip="Cài đặt" id="btn-settings">
            <i class="fa-solid fa-gear"></i>
          </button>
        </div>
      </header>

      <!-- Dynamic Main Content -->
      <main id="main-content">
        <!-- Content rendered by JS modules -->
        <div class="empty-state" id="loading-state">
          <div class="spinner" style="margin: 0 auto var(--space-lg);"></div>
          <h3>Đang tải...</h3>
        </div>
      </main>

    </div>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav" id="bottom-nav">
      <button class="bottom-nav-item active" data-page="dashboard">
        <i class="fa-solid fa-chart-pie"></i>
        <span>Tổng quan</span>
      </button>
      <button class="bottom-nav-item" data-page="vocabulary">
        <i class="fa-solid fa-book-open"></i>
        <span>Từ vựng</span>
      </button>
      <button class="bottom-nav-item" data-page="quiz">
        <i class="fa-solid fa-circle-question"></i>
        <span>Quiz</span>
      </button>
      <button class="bottom-nav-item" data-page="flashcard">
        <i class="fa-solid fa-clone"></i>
        <span>Flashcard</span>
      </button>
      <button class="bottom-nav-item" data-page="minigames">
        <i class="fa-solid fa-gamepad"></i>
        <span>Games</span>
      </button>
    </nav>

  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title"><i class="fa-solid fa-gear"></i> Cài Đặt</h3>
        <button class="modal-close" id="close-settings"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="form-group">
        <label class="form-label">Ngôn ngữ học</label>
        <select class="form-select" id="setting-lang">
          <option value="en">Tiếng Anh (English)</option>
          <option value="de">Tiếng Đức (Deutsch)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Giọng đọc (TTS)</label>
        <select class="form-select" id="setting-voice">
          <option value="en-US">English (US)</option>
          <option value="en-GB">English (UK)</option>
          <option value="en-AU">English (AU)</option>
          <option value="de-DE">Deutsch (DE)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Mục tiêu hàng ngày (từ)</label>
        <select class="form-select" id="setting-daily-goal">
          <option value="5">5 từ / ngày</option>
          <option value="10" selected>10 từ / ngày</option>
          <option value="20">20 từ / ngày</option>
          <option value="30">30 từ / ngày</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Âm thanh</label>
        <div class="flex gap-md">
          <button class="btn btn-secondary" id="setting-sound-toggle">
            <i class="fa-solid fa-volume-high"></i> Bật
          </button>
        </div>
      </div>
      <hr style="border-color: var(--border-primary); margin: var(--space-lg) 0;">
      <div class="form-group">
        <label class="form-label">Dữ liệu</label>
        <div class="flex gap-md">
          <button class="btn btn-secondary" id="setting-export"><i class="fa-solid fa-download"></i> Xuất dữ liệu</button>
          <button class="btn btn-secondary" id="setting-import"><i class="fa-solid fa-upload"></i> Nhập dữ liệu</button>
        </div>
        <input type="file" id="import-file" accept=".json" style="display:none">
      </div>
      <div class="form-group">
        <button class="btn btn-danger w-full" id="setting-reset"><i class="fa-solid fa-trash"></i> Xóa toàn bộ dữ liệu</button>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script src="js/data.js"></script>
  <script src="js/data_advanced.js"></script>
  <script src="js/data_de.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/gamification.js"></script>
  <script src="js/vocabulary.js"></script>
  <script src="js/quiz.js"></script>
  <script src="js/flashcard.js"></script>
  <script src="js/typing.js"></script>
  <script src="js/translate.js"></script>
  <script src="js/listening.js"></script>
  <script src="js/speaking.js"></script>
  <script src="js/spaced-repetition.js"></script>
  <script src="js/minigames.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
